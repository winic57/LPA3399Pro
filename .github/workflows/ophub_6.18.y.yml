name: ophub kernel 6.18.y

on:
  repository_dispatch:
  workflow_dispatch:
    inputs: { }

env:
  TZ: America/New_York

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Show environment
        run: |
          nproc
          uname -a
          cat /etc/*release
          free -h
          df -h

      - name: Run build in Ubuntu 22.04 container
        working-directory: ${{ github.workspace }}
        run: |
          pwd
          ls -alh
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:22.04 \
            bash -c "
              chmod +x /workspace/kdevbuild/ophub_6.18.y_kernel.sh ;
              /workspace/kdevbuild/ophub_6.18.y_kernel.sh
            "

      - name: List build output
        if: always()
        run: |
          ls -alh ${{ github.workspace }}/output/ 2>/dev/null || echo "No output directory"
          md5sum ${{ github.workspace }}/output/* 2>/dev/null || true

      - name: Upload Image to Release
        if: success()
        uses: ncipollo/release-action@v1
        with:
          tag: Neardi-LPA3399Pro-kernel-6.18
          name: Neardi-LPA3399Pro-kernel-6.18
          artifacts: ${{ github.workspace }}/output/*
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### 镜像说明
            LPA3399Pro kernel 6.18.33 build
            - Custom config with RTW88 WiFi + PPP/QMI 4G modem support
            - GMAC v4e DMA SWR workaround patch applied

      - name: Notify WeChat Webhook
        if: always()
        run: |
          curl '${{ secrets.WECHAT_WORK_WEBHOOK }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "content": "### GitHub Action Build Notification\n- **Project**: LPA3399Pro\n- **Workflow**: ${{ github.workflow }}\n- **Status**: **${{ job.status }}**\n- **Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\n- **Triggered By**: ${{ github.actor }}"
              }
            }'
